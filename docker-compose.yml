services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=file:/app/mlruns
    command: streamlit run src/dashboard/app.py --server.address=0.0.0.0

  mlflow:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: mlflow ui --host 0.0.0.0 --backend-store-uri /app/mlruns
